<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRC Style Broadcaster</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @font-face {
            font-family: 'WRCCleanBold';
            src: url('WRCCleanBold.woff2') format('woff2'), url('WRCCleanBold.ttf') format('truetype');
            font-weight: bold;
        }

        :root {
            --wrc-orange: #ff6600;
            --wrc-navy: #001a33;
            --wrc-text: #ffffff;
        }

        body { 
            margin: 0; 
            background: var(--wrc-navy); 
            font-family: 'WRCCleanBold', 'Arial Black', sans-serif; 
            color: var(--wrc-text); 
            overflow: hidden; 
        }

        /* --- ホーム画面 --- */
        #home-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
            background: radial-gradient(circle, var(--wrc-navy) 0%, #000 100%);
            transition: 0.5s;
        }

        /* --- 配信・視聴画面共通UI --- */
        #main-ui { display: none; position: relative; width: 100vw; height: 100vh; background: #000; }

        video { width: 100%; height: 100%; object-fit: contain; }

        /* WRC演出：タイマーUI（位置を中央上部へ） */
        .timer-display { 
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: var(--wrc-navy); 
            padding: 10px 35px; 
            border-left: 8px solid var(--wrc-orange); 
            font-size: 3rem;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 100;
            letter-spacing: 2px;
        }

        /* 配信コントロール（下部） */
        #host-controls {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 26, 51, 0.9);
            border-top: 4px solid var(--wrc-orange);
            padding: 20px;
            display: none; /* 配信時のみ表示 */
            box-sizing: border-box;
            z-index: 110;
        }

        /* ボタン・入力UI */
        .btn { 
            padding: 15px 40px; font-size: 1.4rem; cursor: pointer; 
            background: var(--wrc-orange); border: none; font-family: inherit;
            color: var(--wrc-navy); font-weight: bold; transition: 0.2s;
        }
        .btn:hover { background: #fff; transform: scale(1.05); }
        .btn:disabled { background: #555; cursor: not-allowed; }

        .join-box { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 30px; text-align: center; }
        input { padding: 15px; font-size: 1.5rem; text-align: center; width: 120px; background: #000; border: 2px solid var(--wrc-orange); color: #fff; margin-right: 10px; }

        .info-badge { color: var(--wrc-orange); font-size: 1rem; margin-bottom: 10px; }
        
        #file-selector { color: white; margin-right: 20px; }
    </style>
</head>
<body>

<!-- ホーム画面 -->
<div id="home-screen">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="color: var(--wrc-orange); font-size: 5rem; margin: 0; line-height: 1;">WRC</h1>
        <p style="letter-spacing: 8px; font-size: 1.2rem;">STREAMING HUB</p>
    </div>
    
    <button class="btn" onclick="initPeer('host')">配信モードを開始する</button>

    <div class="join-box">
        <input type="text" id="join-code" maxlength="4" placeholder="CODE">
        <button class="btn" style="background: #eee; font-size: 1.1rem;" onclick="initPeer('guest')">視聴する</button>
    </div>
</div>

<!-- メイン配信・視聴画面 -->
<div id="main-ui">
    <div class="timer-display" id="timer">00:00.000</div>
    
    <video id="video-player" playsinline loop muted></video>

    <!-- 配信者専用コントロールパネル -->
    <div id="host-controls">
        <div class="info-badge" id="host-id-display">WAITING FOR CODE...</div>
        <div style="display: flex; align-items: center;">
            <input type="file" id="file-selector" accept="video/*">
            <button class="btn" id="play-btn" onclick="startBroadcasting()" disabled>映像を配信（PLAY）</button>
        </div>
    </div>
</div>

<script>
    let peer;
    let stream;
    const video = document.getElementById('video-player');
    const fileSelector = document.getElementById('file-selector');

    // WRCタイマー
    setInterval(() => {
        const now = new Date();
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const ms = String(now.getMilliseconds()).padStart(3, '0');
        document.getElementById('timer').innerText = `${m}:${s}.${ms}`;
    }, 45);

    // ファイル選択時の挙動
    fileSelector.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            video.src = URL.createObjectURL(file);
            document.getElementById('play-btn').disabled = false;
        }
    });

    function initPeer(mode) {
        const id = mode === 'host' ? Math.floor(1000 + Math.random() * 9000).toString() : null;
        peer = new Peer(id);

        peer.on('open', (openedId) => {
            document.getElementById('home-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('home-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                
                if (mode === 'host') {
                    document.getElementById('host-controls').style.display = 'block';
                    document.getElementById('host-id-display').innerText = `配信コード: ${openedId}`;
                } else {
                    const code = document.getElementById('join-code').value;
                    connectToBroadcaster(code);
                }
            }, 500);
        });
    }

    // 配信開始（映像をキャプチャしてPeer接続を待機）
    function startBroadcasting() {
        video.muted = false;
        video.play();
        
        // 映像からストリームを生成
        stream = video.captureStream ? video.captureStream() : video.mozCaptureStream();

        peer.on('call', (call) => {
            call.answer(stream);
        });
        
        document.getElementById('play-btn').innerText = "LIVE NOW";
        document.getElementById('play-btn').style.background = "#ff0000";
        document.getElementById('play-btn').style.color = "#fff";
    }

    function connectToBroadcaster(hostId) {
        // ダミーのストリームを投げて開始
        const call = peer.call(hostId, new MediaStream());
        call.on('stream', (remoteStream) => {
            video.srcObject = remoteStream;
            video.play();
        });
    }
</script>
</body>
</html>
